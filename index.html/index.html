<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Financial Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1 id="mainTitle">Financial Monitor</h1>

<div class="tab-buttons">
  <button class="active" onclick="openTab('transactions',this)">Transactions</button>
  <button onclick="openTab('history',this)">History</button>
  <button onclick="openTab('chart',this)">Chart</button>
</div>

<!-- Transactions Tab -->
<div id="transactions" class="tab-content active">
  <div id="container">
    <label>Date</label>
    <input type="date" id="date">
    <label>Category</label>
    <select id="type" onchange="updateSuggestions()">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
    <label>Description</label>
    <input type="text" id="desc" list="descriptionList">
    <datalist id="descriptionList"></datalist>
    <label>Amount</label>
    <input type="number" step="0.01" id="amount">
    <button class="add-btn" onclick="addTransaction()">Add</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Category</th>
        <th>Description</th>
        <th>Amount</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="transactionBody"></tbody>
    <tfoot>
      <tr>
        <td></td>
        <td></td>
        <td>Balance</td>
        <td id="balance">0.00</td>
        <td></td>
      </tr>
    </tfoot>
  </table>
</div>

<!-- History Tab -->
<div id="history" class="tab-content">
  <h2>History</h2>

  <div id="historyEditContainer">
    <h3>Edit Transaction</h3>
    <label>Date</label>
    <input type="date" id="histDate">
    <label>Category</label>
    <select id="histType">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
    <label>Description</label>
    <input type="text" id="histDesc">
    <label>Amount</label>
    <input type="number" step="0.01" id="histAmount">
    <button class="save-btn" onclick="saveHistoryEdit()">Save</button>
  </div>

  <label>Month</label>
  <select id="historyMonth" onchange="renderHistory()">
    <option value="0">January</option><option value="1">February</option><option value="2">March</option>
    <option value="3">April</option><option value="4">May</option><option value="5">June</option>
    <option value="6">July</option><option value="7">August</option><option value="8">September</option>
    <option value="9">October</option><option value="10">November</option><option value="11">December</option>
  </select>

  <label>Year</label>
  <select id="historyYear" onchange="renderHistory()">
    <option>2026</option><option>2027</option><option>2028</option><option>2029</option><option>2030</option>
    <option>2031</option><option>2032</option><option>2033</option><option>2034</option><option>2035</option><option>2036</option>
  </select>

  <h3>Income</h3>
  <table>
    <thead><tr><th>Date</th><th>Description</th><th>Amount</th><th>Action</th></tr></thead>
    <tbody id="historyIncome"></tbody>
    <tfoot><tr><td></td><td>Total</td><td id="incomeTotal">0.00</td><td></td></tr></tfoot>
  </table>

  <h3>Expense</h3>
  <table>
    <thead><tr><th>Date</th><th>Description</th><th>Amount</th><th>Action</th></tr></thead>
    <tbody id="historyExpense"></tbody>
    <tfoot><tr><td></td><td>Total</td><td id="expenseTotal">0.00</td><td></td></tr></tfoot>
  </table>

  <div id="remainingIncomeBox">Remaining Income: 0.00</div>
</div>

<!-- Chart Tab -->
<div id="chart" class="tab-content">
  <h2>Income & Expense Chart</h2>
  <label>Select Year</label>
  <select id="chartYear" onchange="renderChart()"></select>
  <canvas id="incomeExpenseChart" width="400" height="200"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</body>
</html>
