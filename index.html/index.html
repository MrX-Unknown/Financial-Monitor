<!DOCTYPE html>
<html>
<head>
<title>Financial Monitor</title>
<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    padding:20px;
}

.tab-buttons{
    display:flex;
    margin-bottom:10px;
}

.tab-buttons button{
    flex:1;
    padding:10px;
    border:none;
    background:#ddd;
    cursor:pointer;
}

.tab-buttons button.active{
    background:#4285f4;
    color:white;
}

.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
}

#container{
    max-width:400px;
}

select,input{
    padding:10px;
    margin:5px 0;
    width:100%;
    box-sizing:border-box;
}

.add-btn{
    padding:10px;
    width:100%;
    cursor:pointer;
}

.edit-btn{
    padding:3px 6px;
    font-size:12px;
    cursor:pointer;
    margin:2px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
}

table th,table td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

table th{
    background:#f0f0f0;
}

.income{
    color:green;
}

.expense{
    color:red;
}

tfoot td{
    font-weight:bold;
    background:#f5f5f5;
}

#remainingIncomeBox{
    margin-top:10px;
    padding:10px;
    font-weight:bold;
    text-align:center;
}
</style>
</head>
<body>

<h1>Financial Monitoring</h1>

<div class="tab-buttons">
    <button class="active" onclick="openTab('transactions',this)">Transactions</button>
    <button onclick="openTab('history',this)">History</button>
    <button onclick="openTab('chart',this)">Chart</button>
</div>

<!-- Transactions Tab -->
<div id="transactions" class="tab-content active">
<div id="container">
<label>Date</label>
<input type="date" id="date">

<label>Category</label>
<select id="type" onchange="updateSuggestions()">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>

<label>Description</label>
<input type="text" id="desc" list="descriptionList">
<datalist id="descriptionList"></datalist>

<label>Amount</label>
<input type="number" step="0.01" id="amount">

<button class="add-btn" onclick="addTransaction()">Add</button>
</div>

<table>
<thead>
<tr>
<th>Date</th>
<th>Category</th>
<th>Description</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>
<tbody id="transactionBody"></tbody>
<tfoot>
<tr>
<td></td>
<td></td>
<td>Balance</td>
<td id="balance">0.00</td>
<td></td>
</tr>
</tfoot>
</table>
</div>

<!-- History Tab -->
<div id="history" class="tab-content">
<h2>History</h2>

<label>Month</label>
<select id="historyMonth" onchange="renderHistory()">
<option value="0">January</option>
<option value="1">February</option>
<option value="2">March</option>
<option value="3">April</option>
<option value="4">May</option>
<option value="5">June</option>
<option value="6">July</option>
<option value="7">August</option>
<option value="8">September</option>
<option value="9">October</option>
<option value="10">November</option>
<option value="11">December</option>
</select>

<label>Year</label>
<select id="historyYear" onchange="renderHistory()">
<option>2026</option>
<option>2027</option>
<option>2028</option>
<option>2029</option>
<option>2030</option>
<option>2031</option>
<option>2032</option>
<option>2033</option>
<option>2034</option>
<option>2035</option>
<option>2036</option>
</select>

<h3>Income</h3>
<table>
<thead>
<tr>
<th>Date</th>
<th>Description</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>
<tbody id="historyIncome"></tbody>
<tfoot>
<tr>
<td></td>
<td>Total</td>
<td id="incomeTotal">0.00</td>
<td></td>
</tr>
</tfoot>
</table>

<h3>Expense</h3>
<table>
<thead>
<tr>
<th>Date</th>
<th>Description</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>
<tbody id="historyExpense"></tbody>
<tfoot>
<tr>
<td></td>
<td>Total</td>
<td id="expenseTotal">0.00</td>
<td></td>
</tr>
</tfoot>
</table>

<div id="remainingIncomeBox">Remaining Income: 0.00</div>
</div>

<!-- Chart Tab -->
<div id="chart" class="tab-content">
<h2>Income & Expense Chart</h2>

<label>Select Year</label>
<select id="chartYear" onchange="renderChart()"></select>

<canvas id="incomeExpenseChart" width="400" height="200"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
let incomeDescriptions = [];
let expenseDescriptions = [];
let chart;

function saveData(){ localStorage.setItem("transactions",JSON.stringify(transactions)); }

function rebuildSuggestions(){
    incomeDescriptions=[];
    expenseDescriptions=[];
    transactions.forEach(t=>{
        if(t.type==="income" && !incomeDescriptions.includes(t.desc)) incomeDescriptions.push(t.desc);
        if(t.type==="expense" && !expenseDescriptions.includes(t.desc)) expenseDescriptions.push(t.desc);
    });
    updateSuggestions();
}

function updateSuggestions(){
    let type = document.getElementById("type").value;
    let datalist = document.getElementById("descriptionList");
    datalist.innerHTML="";
    let list = (type==="income")?incomeDescriptions:expenseDescriptions;
    list.forEach(desc=>{
        let option=document.createElement("option");
        option.value=desc;
        datalist.appendChild(option);
    });
}

function openTab(tabId,btn){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-buttons button").forEach(b=>b.classList.remove("active"));
    document.getElementById(tabId).classList.add("active");
    btn.classList.add("active");
    if(tabId==="history") renderHistory();
    if(tabId==="chart") { populateChartYears(); renderChart(); }
}

function getCurrentMonth(){ let d=new Date(); return {month:d.getMonth(),year:d.getFullYear()}; }

function addTransaction(){
    let date=document.getElementById("date").value;
    let type=document.getElementById("type").value;
    let desc=document.getElementById("desc").value;
    let amount=parseFloat(document.getElementById("amount").value);
    if(!date || !desc || !amount){ alert("Please enter Date, Description and Amount"); return; }
    transactions.push({date,type,desc,amount});
    saveData(); renderTable(); updateBalance(); rebuildSuggestions();
    document.getElementById("desc").value="";
    document.getElementById("amount").value="";
    document.getElementById("date").value=new Date().toISOString().split("T")[0];
}

function editRow(i){
    let t=transactions[i];
    document.getElementById("date").value=t.date;
    document.getElementById("type").value=t.type;
    document.getElementById("desc").value=t.desc;
    document.getElementById("amount").value=t.amount;
    transactions.splice(i,1);
    saveData(); renderTable(); updateBalance(); rebuildSuggestions();
}

function deleteRow(i){
    if(confirm("Delete this record?")){
        transactions.splice(i,1); saveData(); renderTable(); updateBalance(); rebuildSuggestions();
    }
}

function renderTable(){
    let body=document.getElementById("transactionBody");
    body.innerHTML="";
    let current=getCurrentMonth();
    transactions.forEach((t,i)=>{
        let d=new Date(t.date);
        if(d.getMonth()===current.month && d.getFullYear()===current.year){
            let row=document.createElement("tr");
            row.innerHTML=`
                <td>${t.date}</td>
                <td class="${t.type}">${t.type}</td>
                <td>${t.desc}</td>
                <td class="${t.type}">${t.amount.toFixed(2)}</td>
                <td>
                    <button class="edit-btn" onclick="editRow(${i})">Edit</button>
                    <button class="edit-btn" onclick="deleteRow(${i})">Delete</button>
                </td>
            `;
            body.appendChild(row);
        }
    });
}

function updateBalance(){
    let balance=0;
    let current=getCurrentMonth();
    transactions.forEach(t=>{
        let d=new Date(t.date);
        if(d.getMonth()===current.month && d.getFullYear()===current.year){
            balance += t.type==="income"? t.amount : -t.amount;
        }
    });
    document.getElementById("balance").textContent=balance.toFixed(2);
}

function renderHistory(){
    let month=parseInt(document.getElementById("historyMonth").value);
    let year=parseInt(document.getElementById("historyYear").value);
    let incomeBody=document.getElementById("historyIncome");
    let expenseBody=document.getElementById("historyExpense");
    incomeBody.innerHTML=""; expenseBody.innerHTML="";
    let incomeTotal=0, expenseTotal=0;
    transactions.forEach((t,i)=>{
        let d=new Date(t.date);
        if(d.getMonth()===month && d.getFullYear()===year){
            if(t.type==="income"){
                incomeTotal+=t.amount;
                incomeBody.innerHTML+=`
                <tr>
                    <td>${t.date}</td>
                    <td>${t.desc}</td>
                    <td>${t.amount.toFixed(2)}</td>
                    <td>
                        <button class="edit-btn" onclick="editRow(${i})">Edit</button>
                        <button class="edit-btn" onclick="deleteRow(${i})">Delete</button>
                    </td>
                </tr>`;
            } else {
                expenseTotal+=t.amount;
                expenseBody.innerHTML+=`
                <tr>
                    <td>${t.date}</td>
                    <td>${t.desc}</td>
                    <td>${t.amount.toFixed(2)}</td>
                    <td>
                        <button class="edit-btn" onclick="editRow(${i})">Edit</button>
                        <button class="edit-btn" onclick="deleteRow(${i})">Delete</button>
                    </td>
                </tr>`;
            }
        }
    });
    document.getElementById("incomeTotal").textContent=incomeTotal.toFixed(2);
    document.getElementById("expenseTotal").textContent=expenseTotal.toFixed(2);

    // Remaining Income box with dynamic color
    let remaining = incomeTotal - expenseTotal;
    let box = document.getElementById("remainingIncomeBox");
    box.textContent = "Remaining Income: " + remaining.toFixed(2);
    if(remaining > 0){
        box.style.background = "#d4edda"; 
        box.style.borderLeft = "5px solid #28a745";
    } else if(remaining < 0){
        box.style.background = "#f8d7da"; 
        box.style.borderLeft = "5px solid #dc3545";
    } else {
        box.style.background = "#f0f0f0"; 
        box.style.borderLeft = "5px solid #ccc";
    }
}

function populateChartYears(){
    let years = Array.from(new Set(transactions.map(t=>new Date(t.date).getFullYear())));
    let chartYear = document.getElementById("chartYear");
    chartYear.innerHTML="";
    if(years.length===0) years=[new Date().getFullYear()];
    years.sort().forEach(y=>{
        let option=document.createElement("option");
        option.value=y; option.text=y; chartYear.appendChild(option);
    });
}

function renderChart(){
    let year=parseInt(document.getElementById("chartYear").value);
    let incomeData = Array(12).fill(0);
    let expenseData = Array(12).fill(0);
    transactions.forEach(t=>{
        let d=new Date(t.date);
        if(d.getFullYear()===year){
            if(t.type==="income") incomeData[d.getMonth()]+=t.amount;
            else expenseData[d.getMonth()]+=t.amount;
        }
    });
    const ctx = document.getElementById('incomeExpenseChart').getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx,{
        type:'line',
        data:{
            labels:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
            datasets:[
                {label:'Income', data:incomeData, borderColor:'green', fill:false, tension:0.2},
                {label:'Expense', data:expenseData, borderColor:'red', fill:false, tension:0.2}
            ]
        },
        options:{responsive:true, plugins:{legend:{position:'top'}}, scales:{y:{beginAtZero:true}}}
    });
}

// Initialize
document.getElementById("date").value = new Date().toISOString().split("T")[0];
renderTable(); updateBalance(); rebuildSuggestions();
</script>
</body>
</html>
